<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Grabify Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0c0c0f; --surface: #141418; --surface2: #1c1c22;
  --border: #28282f; --border2: #38383f; --text: #f0f0f5; --muted: #7a7a90;
  --grad: linear-gradient(135deg, #f9a826, #f7645a, #c13584, #833ab4);
  --success: #22c55e; --danger: #ef4444; --warning: #f9a826;
}
body { font-family: 'Bricolage Grotesque', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
.wrapper { max-width: 1000px; margin: 0 auto; padding: 2rem 1.5rem; }

/* Header */
.header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2.5rem; padding-bottom: 1.5rem; border-bottom: 1px solid var(--border); }
.logo { display: flex; align-items: center; gap: 0.75rem; }
.logo-icon { width: 40px; height: 40px; border-radius: 10px; background: var(--grad); display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
.logo-text { font-size: 1.4rem; font-weight: 800; background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.admin-badge { background: var(--surface2); border: 1px solid var(--border2); border-radius: 6px; font-family: 'JetBrains Mono', monospace; font-size: 0.72rem; color: var(--warning); padding: 0.25rem 0.6rem; letter-spacing: 0.06em; }
.btn-logout { background: var(--surface2); border: 1px solid var(--border2); border-radius: 8px; color: var(--muted); font-family: 'Bricolage Grotesque', sans-serif; font-size: 0.85rem; font-weight: 600; padding: 0.5rem 1rem; cursor: pointer; transition: all 0.2s; }
.btn-logout:hover { border-color: var(--danger); color: var(--danger); }

/* Login Screen */
.login-screen { display: flex; align-items: center; justify-content: center; min-height: 80vh; }
.login-card { background: var(--surface); border: 1px solid var(--border); border-radius: 24px; padding: 3rem 2.5rem; text-align: center; max-width: 400px; width: 100%; }
.login-icon { font-size: 3rem; margin-bottom: 1rem; }
.login-card h2 { font-size: 1.8rem; font-weight: 800; margin-bottom: 0.4rem; }
.login-card p { color: var(--muted); margin-bottom: 2rem; font-size: 0.95rem; }
.btn-google { display: flex; align-items: center; justify-content: center; gap: 0.75rem; width: 100%; background: #fff; border: none; border-radius: 12px; color: #333; font-family: 'Bricolage Grotesque', sans-serif; font-weight: 700; font-size: 1rem; padding: 1rem; cursor: pointer; transition: box-shadow 0.2s, transform 0.1s; }
.btn-google:hover { box-shadow: 0 4px 20px rgba(255,255,255,0.15); transform: translateY(-1px); }
.btn-google:active { transform: scale(0.98); }
.login-note { font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; color: var(--muted); margin-top: 1rem; min-height: 1rem; }
.login-note.error { color: var(--danger); }

/* Stats */
.stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; margin-bottom: 2rem; }
.stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 1.25rem; }
.stat-label { font-family: 'JetBrains Mono', monospace; font-size: 0.72rem; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 0.5rem; }
.stat-val { font-size: 2rem; font-weight: 800; background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }

/* Payments Table */
.section { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 1.5rem; margin-bottom: 1.5rem; }
.section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; }
.section-title { font-size: 1.1rem; font-weight: 700; }
.section-badge { background: var(--surface2); border: 1px solid var(--border2); border-radius: 6px; font-family: 'JetBrains Mono', monospace; font-size: 0.72rem; color: var(--muted); padding: 0.2rem 0.5rem; }
.empty { text-align: center; padding: 2.5rem; color: var(--muted); font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; }
.payment-item { background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 0.75rem; display: flex; align-items: center; justify-content: space-between; gap: 1rem; flex-wrap: wrap; }
.payment-info { flex: 1; }
.payment-name { font-weight: 700; font-size: 0.95rem; margin-bottom: 0.2rem; }
.payment-ref { font-family: 'JetBrains Mono', monospace; font-size: 0.78rem; color: var(--muted); margin-bottom: 0.2rem; }
.payment-email { font-size: 0.8rem; color: var(--muted); }
.payment-date { font-family: 'JetBrains Mono', monospace; font-size: 0.72rem; color: var(--muted); text-align: right; }
.payment-actions { display: flex; gap: 0.5rem; }
.status-badge { display: inline-block; border-radius: 6px; font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; font-weight: 700; padding: 0.2rem 0.5rem; letter-spacing: 0.04em; text-transform: uppercase; }
.status-pending  { background: rgba(249,168,38,0.15); color: var(--warning); border: 1px solid rgba(249,168,38,0.3); }
.status-approved { background: rgba(34,197,94,0.15); color: var(--success); border: 1px solid rgba(34,197,94,0.3); }
.status-rejected { background: rgba(239,68,68,0.15); color: var(--danger); border: 1px solid rgba(239,68,68,0.3); }
.btn-approve { background: rgba(34,197,94,0.15); border: 1px solid rgba(34,197,94,0.3); border-radius: 8px; color: var(--success); font-family: 'Bricolage Grotesque', sans-serif; font-weight: 700; font-size: 0.82rem; padding: 0.4rem 0.85rem; cursor: pointer; transition: all 0.2s; }
.btn-approve:hover { background: rgba(34,197,94,0.25); }
.btn-reject { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.25); border-radius: 8px; color: var(--danger); font-family: 'Bricolage Grotesque', sans-serif; font-weight: 700; font-size: 0.82rem; padding: 0.4rem 0.85rem; cursor: pointer; transition: all 0.2s; }
.btn-reject:hover { background: rgba(239,68,68,0.2); }

/* Users */
.user-item { background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 0.75rem; display: flex; align-items: center; justify-content: space-between; gap: 1rem; }
.user-info { flex: 1; }
.user-name { font-weight: 700; font-size: 0.95rem; margin-bottom: 0.2rem; }
.user-email { font-family: 'JetBrains Mono', monospace; font-size: 0.78rem; color: var(--muted); }
.premium-toggle { background: var(--surface); border: 1px solid var(--border2); border-radius: 8px; color: var(--muted); font-family: 'Bricolage Grotesque', sans-serif; font-weight: 700; font-size: 0.82rem; padding: 0.4rem 0.85rem; cursor: pointer; transition: all 0.2s; }
.premium-toggle.is-premium { background: rgba(249,168,38,0.15); border-color: rgba(249,168,38,0.3); color: var(--warning); }
.premium-toggle:hover { border-color: var(--border2); }

@keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
.fade-in { animation: fadeIn 0.4s ease both; }

@media (max-width: 600px) {
  .stats-grid { grid-template-columns: repeat(2, 1fr); }
  .payment-item { flex-direction: column; align-items: flex-start; }
}
  </style>
</head>
<body>
<div class="wrapper">
  <!-- Login -->
  <div class="login-screen" id="loginScreen">
    <div class="login-card fade-in">
      <div class="login-icon">🛡️</div>
      <h2>Admin Login</h2>
      <p>Sign in with your authorized admin Google account</p>
      <button class="btn-google" id="googleLoginBtn">
        <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
        Continue with Google
      </button>
      <p class="login-note" id="loginNote"></p>
    </div>
  </div>

  <!-- Dashboard -->
  <div id="dashboard" style="display:none">
    <div class="header fade-in">
      <div class="logo">
        <div class="logo-icon">⚡</div>
        <span class="logo-text">Grabify</span>
        <span class="admin-badge">ADMIN</span>
      </div>
      <button class="btn-logout" id="logoutBtn">Sign out</button>
    </div>

    <div class="stats-grid fade-in" id="statsGrid">
      <div class="stat-card"><div class="stat-label">Total Payments</div><div class="stat-val" id="statTotal">0</div></div>
      <div class="stat-card"><div class="stat-label">Pending</div><div class="stat-val" id="statPending">0</div></div>
      <div class="stat-card"><div class="stat-label">Approved</div><div class="stat-val" id="statApproved">0</div></div>
      <div class="stat-card"><div class="stat-label">Revenue</div><div class="stat-val" id="statRevenue">₱0</div></div>
    </div>

    <div class="section fade-in">
      <div class="section-header">
        <span class="section-title">💸 GCash Payments</span>
        <span class="section-badge" id="paymentCount">0 submissions</span>
      </div>
      <div id="paymentsList"><div class="empty">No payments yet</div></div>
    </div>

    <div class="section fade-in">
      <div class="section-header">
        <span class="section-title">👥 Users</span>
        <span class="section-badge" id="userCount">0 users</span>
      </div>
      <div id="usersList"><div class="empty">No users yet</div></div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

// ⚠️ SET YOUR ADMIN EMAIL HERE
const ADMIN_EMAILS = ["kimmendezfeb01@gmail.com"];

const app  = initializeApp({
  apiKey: "AIzaSyBlegaXTm-kZzlPoesU65DEwfAAvtLaC4g",
  authDomain: "lyzy-downloader.firebaseapp.com",
  projectId: "lyzy-downloader",
  storageBucket: "lyzy-downloader.firebasestorage.app",
  messagingSenderId: "419225641839",
  appId: "1:419225641839:web:ef058447ce1805331efe9a",
  databaseURL: "https://lyzy-downloader-default-rtdb.asia-southeast1.firebasedatabase.app"
});
const auth = getAuth(app);
const db   = getDatabase(app);

// Check secret key
const params = new URLSearchParams(window.location.search);
if (params.get("key") !== "grabify_admin_2025") {
  document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:monospace;color:#ef4444;font-size:1.2rem;">⛔ Access Denied</div>';
}

// Auth
document.getElementById("googleLoginBtn").addEventListener("click", async () => {
  const note = document.getElementById("loginNote");
  note.textContent = "Signing in..."; note.className = "login-note";
  try {
    await signInWithPopup(auth, new GoogleAuthProvider());
  } catch(e) {
    note.className = "login-note error";
    note.textContent = "Sign-in failed. Try again.";
  }
});

document.getElementById("logoutBtn").addEventListener("click", () => signOut(auth));

onAuthStateChanged(auth, user => {
  if (user && ADMIN_EMAILS.includes(user.email)) {
    document.getElementById("loginScreen").style.display = "none";
    document.getElementById("dashboard").style.display = "block";
    loadData();
  } else if (user) {
    signOut(auth);
    const note = document.getElementById("loginNote");
    note.className = "login-note error";
    note.textContent = "⛔ Not authorized. Use your admin email.";
    document.getElementById("loginScreen").style.display = "flex";
    document.getElementById("dashboard").style.display = "none";
  } else {
    document.getElementById("loginScreen").style.display = "flex";
    document.getElementById("dashboard").style.display = "none";
  }
});

function loadData() {
  // Payments
  onValue(ref(db, "gcash_payments"), snap => {
    const data = snap.val() || {};
    const entries = Object.entries(data).sort((a,b) => (b[1].createdAt||0)-(a[1].createdAt||0));
    const list = document.getElementById("paymentsList");
    const pending  = entries.filter(e=>e[1].status==="pending").length;
    const approved = entries.filter(e=>e[1].status==="approved").length;
    document.getElementById("statTotal").textContent   = entries.length;
    document.getElementById("statPending").textContent  = pending;
    document.getElementById("statApproved").textContent = approved;
    document.getElementById("statRevenue").textContent  = `₱${approved*99}`;
    document.getElementById("paymentCount").textContent = `${entries.length} submissions`;

    if (entries.length === 0) { list.innerHTML = '<div class="empty">No payments yet</div>'; return; }
    list.innerHTML = "";
    entries.forEach(([id, p]) => {
      const date = p.createdAt ? new Date(p.createdAt).toLocaleString() : "—";
      const div = document.createElement("div");
      div.className = "payment-item";
      div.innerHTML = `
        <div class="payment-info">
          <div class="payment-name">${p.name||"Anonymous"}</div>
          <div class="payment-ref">Ref: ${p.referenceNumber||"—"}</div>
          <div class="payment-email">${p.email||"Not signed in"}</div>
        </div>
        <div>
          <span class="status-badge status-${p.status||'pending'}">${p.status||'pending'}</span>
          <div class="payment-date">${date}</div>
        </div>
        <div class="payment-actions">
          ${p.status!=="approved"?`<button class="btn-approve" onclick="approvePayment('${id}','${p.uid||''}')">✓ Approve</button>`:""}
          ${p.status!=="rejected"?`<button class="btn-reject" onclick="rejectPayment('${id}')">✗ Reject</button>`:""}
        </div>`;
      list.appendChild(div);
    });
  });

  // Users
  onValue(ref(db, "users"), snap => {
    const data = snap.val() || {};
    const entries = Object.entries(data);
    const list = document.getElementById("usersList");
    document.getElementById("userCount").textContent = `${entries.length} users`;
    if (entries.length === 0) { list.innerHTML = '<div class="empty">No users yet</div>'; return; }
    list.innerHTML = "";
    entries.forEach(([uid, u]) => {
      const div = document.createElement("div");
      div.className = "user-item";
      div.innerHTML = `
        <div class="user-info">
          <div class="user-name">${u.name||"Unknown"}</div>
          <div class="user-email">${u.email||uid}</div>
        </div>
        <button class="premium-toggle ${u.premium?'is-premium':''}" onclick="togglePremium('${uid}',${!u.premium})">
          ${u.premium?"⭐ Premium":"○ Free"}
        </button>`;
      list.appendChild(div);
    });
  });
}

window.approvePayment = async (id, uid) => {
  await update(ref(db, `gcash_payments/${id}`), { status: "approved" });
  if (uid) await update(ref(db, `users/${uid}`), { premium: true });
};
window.rejectPayment = async (id) => {
  await update(ref(db, `gcash_payments/${id}`), { status: "rejected" });
};
window.togglePremium = async (uid, val) => {
  await update(ref(db, `users/${uid}`), { premium: val });
};
</script>
</body>
</html>
